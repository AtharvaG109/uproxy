name: Bug report
description: Report a reproducible uproxy defect.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Config, command, traffic path, expected behavior, and observed behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler, CMake/Ninja versions, and whether submodules are initialized.
    validations:
      required: true
